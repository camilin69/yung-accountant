# docker-compose.database.yml
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgresdb
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret123}
      POSTGRES_DB: ${POSTGRES_DB:-yung_accountant}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - shared-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d yung_accountant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # PGBOUNCER - Connection Pooling
  # ============================================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    restart: always
    ports:
      - "6432:5432" 
    environment:
      DB_USER: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret123}
      DB_HOST: postgresdb
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-yung_accountant}
      POOL_MODE: transaction
      SERVER_IDLE_TIMEOUT: 0        # Nunca cerrar conexiones inactivas
      SERVER_LIFETIME: 0            # Nunca reciclar conexiones
      CLIENT_IDLE_TIMEOUT: 0        # Nunca cerrar clientes inactivos
      SERVER_CONNECT_TIMEOUT: 15    # Timeout de conexion a PostgreSQL
      QUERY_TIMEOUT: 0              # Sin timeout de queries
      QUERY_WAIT_TIMEOUT: 120       # Timeout de espera en cola
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 25
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      AUTH_TYPE: scram-sha-256
      MAX_DB_CONNECTIONS: 50
      ADMIN_USERS: ${POSTGRES_USER:-admin}
      STATS_USERS: ${POSTGRES_USER:-admin}
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    networks:
      - shared-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U admin -d yung_accountant"]
      interval: 10s
      timeout: 5s
      retries: 5


  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - shared-network
    depends_on:
      - postgres
      - pgbouncer

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    networks:
      - shared-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: always
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    networks:
      - shared-network
    depends_on:
      - redis

networks:
  shared-network:
    external: true

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  redis_insight_data: