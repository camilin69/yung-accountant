# docker-compose.auth.yml
services:
  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile.alpine
    container_name: auth
    restart: always
    ports:
      - "8081:8081"
    environment:
      # Kafka
      KAFKA_BROKER: kafka:9092
      # PostgreSQL
      POSTGRES_HOST: postgresdb
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: yung_accountant
      POSTGRES_SSL_MODE: disable
      # Servidor
      SERVER_PORT: 8081
      # Keycloak
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: yung-accountant
    networks:
      - shared-network

networks:
  shared-network:
    external: true