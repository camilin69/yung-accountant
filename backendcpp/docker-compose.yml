services:
  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile.alpine
    container_name: auth
    restart: always
    ports:
      - "8081:8081"
    environment:
      KAFKA_BROKER: kafka:9092
      POSTGRES_HOST: postgresdb
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: yung_accountant
      POSTGRES_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123
      SERVER_PORT: 8081
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: yung-accountant
    networks:
      - shared-network

  category:
