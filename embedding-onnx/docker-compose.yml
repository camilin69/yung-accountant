# embedding-onnx/docker-compose.yml
services:
  embedding:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: embedding-onnx
    restart: unless-stopped
    ports:
      - "${EMBEDDING_PORT}:${EMBEDDING_PORT}"
    env_file: .env
    environment:
      MODEL_PATH: ${MODEL_PATH}
      TOKENIZER_PATH: ${TOKENIZER_PATH}
      NUM_THREADS: ${NUM_THREADS}
      PORT: ${EMBEDDING_PORT}
    volumes:
      - embedding_models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${EMBEDDING_PORT}/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - shared-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  shared-network:
    external: true

volumes:
  embedding_models:
