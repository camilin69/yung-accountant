# embedding-onnx/docker-compose.yml
services:
  embedding:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: embedding-onnx
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      MODEL_PATH: /app/models/model.onnx
      TOKENIZER_PATH: /app/models/tokenizer
      NUM_THREADS: 4
      PORT: 8090
    volumes:
      - embedding_models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - shared-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  shared-network:
    external: true

volumes:
  embedding_models: