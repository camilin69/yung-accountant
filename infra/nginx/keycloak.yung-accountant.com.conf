# Nginx — Keycloak behind Cloudflare
# Deploy to: /etc/nginx/conf.d/keycloak.conf
# SSL cert obtained via: sudo certbot --nginx -d keycloak.yung-accountant.com
#
# DNS: keycloak.yung-accountant.com → A → VM IP → Proxied (orange cloud) in Cloudflare

# Rate limiting zones (must be outside server block)
limit_req_zone $binary_remote_addr zone=keycloak_admin:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=keycloak_auth:10m rate=300r/m;

server {
    listen 443 ssl http2;
    server_name keycloak.yung-accountant.com;

    # SSL — certbot managed
    ssl_certificate /etc/letsencrypt/live/keycloak.yung-accountant.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keycloak.yung-accountant.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Cloudflare real IP
    include /etc/nginx/conf.d/cloudflare-realip.conf;

    # Only Cloudflare-proxied traffic
    if ($http_cf_connecting_ip = "") {
        return 403;
    }

    # Security headers (Keycloak-specific — less restrictive than frontend)
    include /etc/nginx/conf.d/security-headers-keycloak.conf;

    location /admin/ {
        limit_req zone=keycloak_admin burst=10 nodelay;
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
    }

    location / {
        limit_req zone=keycloak_auth burst=50 nodelay;
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
    }
}

# HTTP → HTTPS
server {
    listen 80;
    server_name keycloak.yung-accountant.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
