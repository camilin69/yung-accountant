# Security headers for Keycloak admin console
# More permissive than the frontend headers — Keycloak loads its own iframes and inline resources

# HSTS (2 years, include subdomains, preload list)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Keycloak admin console is embedded — allow framing from same origin
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions: restrict sensitive APIs
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# CSP — allows Keycloak's own scripts, styles, fonts, and iframes
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.gravatar.com; font-src 'self' data:; connect-src 'self'; frame-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
