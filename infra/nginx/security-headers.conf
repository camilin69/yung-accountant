# Security headers — included in server blocks

# HSTS (2 years, include subdomains, preload list)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Disable XSS auditor (deprecated, CSP handles this)
add_header X-XSS-Protection "0" always;

# Permissions: restrict sensitive APIs
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# Content-Security-Policy
# Allows: self scripts/styles, Cloudflare Turnstile, Google OAuth,
#         Chart.js inline styles (for dynamic theming), Cloudinary images
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com https://static.cloudflareinsights.com https://accounts.google.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://res.cloudinary.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com https://accounts.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
