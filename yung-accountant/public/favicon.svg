<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#FF6584"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <rect width="100" height="100" rx="20" fill="url(#gradient)"/>
  
  <!-- Chart line -->
  <polyline points="20,70 35,50 50,60 65,35 80,45" 
            fill="none" 
            stroke="white" 
            stroke-width="4" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
  
  <!-- Bars -->
  <rect x="20" y="75" width="8" height="15" rx="2" fill="white" opacity="0.7"/>
  <rect x="35" y="65" width="8" height="25" rx="2" fill="white" opacity="0.7"/>
  <rect x="50" y="55" width="8" height="35" rx="2" fill="white" opacity="0.7"/>
  <rect x="65" y="45" width="8" height="45" rx="2" fill="white" opacity="0.7"/>
  <rect x="80" y="60" width="8" height="30" rx="2" fill="white" opacity="0.7"/>
</svg>