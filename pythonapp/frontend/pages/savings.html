<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahorros - Cuenta Confiable</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar dashboard-nav">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-wallet"></i>
                <span>Cuenta Confiable</span>
            </div>
            <div class="nav-menu">
                <span id="userName"></span>
                <a href="#" id="logoutBtn" class="btn btn-outline" style="border-color: white; color: white;">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="dashboard">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Inicio</a></li>
                <li><a href="goals.html"><i class="fas fa-bullseye"></i> Metas</a></li>
                <li><a href="savings.html" class="active"><i class="fas fa-piggy-bank"></i> Ahorros</a></li>
                <li><a href="purchases.html"><i class="fas fa-shopping-cart"></i> Compras</a></li>
                <li><a href="storage.html"><i class="fas fa-database"></i> Almacenamiento</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="card-header">
                <h1>Registro de Ahorros</h1>
                <button class="btn btn-primary" onclick="openSavingModal()">
                    <i class="fas fa-plus"></i> Nuevo Ahorro
                </button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Total Ahorrado</h4>
                    <div class="value" id="totalSavings">$0</div>
                </div>
                <div class="stat-card">
                    <h4>Ahorro del Mes</h4>
                    <div class="value" id="monthlySavings">$0</div>
                </div>
                <div class="stat-card positive">
                    <h4>Proyección Anual</h4>
                    <div class="value" id="yearlyProjection">$0</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Filtros de Análisis</h3>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                    <div class="form-group">
                        <label for="timeRange">Rango de Tiempo</label>
                        <select id="timeRange" onchange="filterSavings()">
                            <option value="week">Última Semana</option>
                            <option value="month" selected>Último Mes</option>
                            <option value="quarter">Último Trimestre</option>
                            <option value="year">Último Año</option>
                            <option value="custom">Personalizado</option>
                        </select>
                    </div>
                    <div class="form-group" id="customDateRange" style="display: none;">
                        <label>Fecha Inicio</label>
                        <input type="date" id="startDate">
                        <label>Fecha Fin</label>
                        <input type="date" id="endDate">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="table-container">
                    <table id="savingsTable">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Descripción</th>
                                <th>Monto</th>
                                <th>Categoría</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="savingsList">
                            <!-- Se llenará con JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para crear/editar ahorros -->
    <div id="savingModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeSavingModal()">&times;</span>
            <h2 id="modalTitle">Nuevo Ahorro</h2>
            <form id="savingForm">
                <input type="hidden" id="savingId">
                <div class="form-group">
                    <label for="savingDate">Fecha</label>
                    <input type="date" id="savingDate" required>
                </div>
                <div class="form-group">
                    <label for="savingDescription">Descripción</label>
                    <input type="text" id="savingDescription" required>
                </div>
                <div class="form-group">
                    <label for="savingAmount">Monto</label>
                    <input type="number" id="savingAmount" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="savingCategory">Categoría</label>
                    <select id="savingCategory" required>
                        <option value="emergency">Fondo de Emergencia</option>
                        <option value="goal">Meta Específica</option>
                        <option value="investment">Inversión</option>
                        <option value="other">Otro</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Guardar Ahorro</button>
            </form>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/savings.js"></script>
</body>
</html>
