<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metas - Cuenta Confiable</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar dashboard-nav">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-wallet"></i>
                <span>Cuenta Confiable</span>
            </div>
            <div class="nav-menu">
                <span id="userName"></span>
                <a href="#" id="logoutBtn" class="btn btn-outline" style="border-color: white; color: white;">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="dashboard">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Inicio</a></li>
                <li><a href="goals.html" class="active"><i class="fas fa-bullseye"></i> Metas</a></li>
                <li><a href="savings.html"><i class="fas fa-piggy-bank"></i> Ahorros</a></li>
                <li><a href="purchases.html"><i class="fas fa-shopping-cart"></i> Compras</a></li>
                <li><a href="storage.html"><i class="fas fa-database"></i> Almacenamiento</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="card-header">
                <h1>Mis Metas Financieras</h1>
                <button class="btn btn-primary" onclick="openGoalModal()">
                    <i class="fas fa-plus"></i> Nueva Meta
                </button>
            </div>

            <div class="card">
                <div class="table-container">
                    <table id="goalsTable">
                        <thead>
                            <tr>
                                <th>Título</th>
                                <th>Descripción</th>
                                <th>Monto Objetivo</th>
                                <th>Monto Actual</th>
                                <th>Progreso</th>
                                <th>Fecha Inicio</th>
                                <th>Fecha Fin</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="goalsList">
                            <!-- Se llenará con JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para crear/editar metas -->
    <div id="goalModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGoalModal()">&times;</span>
            <h2 id="modalTitle">Nueva Meta</h2>
            <form id="goalForm">
                <input type="hidden" id="goalId">
                <div class="form-group">
                    <label for="goalTitle">Título</label>
                    <input type="text" id="goalTitle" required>
                </div>
                <div class="form-group">
                    <label for="goalDescription">Descripción</label>
                    <textarea id="goalDescription" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="goalTarget">Monto Objetivo</label>
                    <input type="number" id="goalTarget" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="goalCurrent">Monto Actual</label>
                    <input type="number" id="goalCurrent" min="0" step="0.01" value="0" required>
                </div>
                <div class="form-group">
                    <label for="goalStartDate">Fecha de Inicio</label>
                    <input type="date" id="goalStartDate" required>
                </div>
                <div class="form-group">
                    <label for="goalEndDate">Fecha de Fin</label>
                    <input type="date" id="goalEndDate" required>
                </div>
                <button type="submit" class="btn btn-primary">Guardar Meta</button>
            </form>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/goals.js"></script>
</body>
</html>
