<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras - Cuenta Confiable</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar dashboard-nav">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-wallet"></i>
                <span>Cuenta Confiable</span>
            </div>
            <div class="nav-menu">
                <span id="userName"></span>
                <a href="#" id="logoutBtn" class="btn btn-outline" style="border-color: white; color: white;">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="dashboard">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Inicio</a></li>
                <li><a href="goals.html"><i class="fas fa-bullseye"></i> Metas</a></li>
                <li><a href="savings.html"><i class="fas fa-piggy-bank"></i> Ahorros</a></li>
                <li><a href="purchases.html" class="active"><i class="fas fa-shopping-cart"></i> Compras</a></li>
                <li><a href="storage.html"><i class="fas fa-database"></i> Almacenamiento</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="card-header">
                <h1>Registro de Compras</h1>
                <button class="btn btn-primary" onclick="openPurchaseModal()">
                    <i class="fas fa-plus"></i> Nueva Compra
                </button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Gasto Total</h4>
                    <div class="value negative" id="totalExpenses">$0</div>
                </div>
                <div class="stat-card">
                    <h4>Gasto Promedio</h4>
                    <div class="value" id="avgExpense">$0</div>
                </div>
                <div class="stat-card">
                    <h4>Mayor Gasto</h4>
                    <div class="value negative" id="maxExpense">$0</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Filtros de Análisis</h3>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                    <div class="form-group">
                        <label for="timeRange">Período</label>
                        <select id="timeRange" onchange="filterPurchases()">
                            <option value="week">Esta Semana</option>
                            <option value="month" selected>Este Mes</option>
                            <option value="quarter">Este Trimestre</option>
                            <option value="year">Este Año</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="category">Categoría</label>
                        <select id="category" onchange="filterPurchases()">
                            <option value="all">Todas</option>
                            <option value="food">Alimentación</option>
                            <option value="transport">Transporte</option>
                            <option value="entertainment">Entretenimiento</option>
                            <option value="education">Educación</option>
                            <option value="health">Salud</option>
                            <option value="other">Otros</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="table-container">
                    <table id="purchasesTable">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Descripción</th>
                                <th>Monto</th>
                                <th>Categoría</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="purchasesList">
                            <!-- Se llenará con JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para crear/editar compras -->
    <div id="purchaseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closePurchaseModal()">&times;</span>
            <h2 id="modalTitle">Nueva Compra</h2>
            <form id="purchaseForm">
                <input type="hidden" id="purchaseId">
                <div class="form-group">
                    <label for="purchaseDate">Fecha</label>
                    <input type="date" id="purchaseDate" required>
                </div>
                <div class="form-group">
                    <label for="purchaseDescription">Descripción</label>
                    <input type="text" id="purchaseDescription" required>
                </div>
                <div class="form-group">
                    <label for="purchaseAmount">Monto</label>
                    <input type="number" id="purchaseAmount" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="purchaseCategory">Categoría</label>
                    <select id="purchaseCategory" required>
                        <option value="food">Alimentación</option>
                        <option value="transport">Transporte</option>
                        <option value="entertainment">Entretenimiento</option>
                        <option value="education">Educación</option>
                        <option value="health">Salud</option>
                        <option value="other">Otros</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Guardar Compra</button>
            </form>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/purchases.js"></script>
</body>
</html>
