<div class="form-container">
  <div class="form-card">
    <h2>{{ isEditing ? 'Editar Meta' : 'Nueva Meta' }}</h2>
    
    <form (ngSubmit)="onSubmit()" #goalForm="ngForm">
      <div class="form-group">
        <label for="title">Título *</label>
        <input
          type="text"
          id="title"
          name="title"
          [(ngModel)]="goal.title"
          required
          #title="ngModel"
        />
        <div class="error" *ngIf="title.invalid && title.touched">
          El título es requerido
        </div>
      </div>
      
      <div class="form-group">
        <label for="description">Descripción</label>
        <textarea
          id="description"
          name="description"
          rows="3"
          [(ngModel)]="goal.description"
        ></textarea>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="target_amount">Monto Objetivo *</label>
          <input
            type="number"
            id="target_amount"
            name="target_amount"
            [(ngModel)]="goal.target_amount"
            required
            min="0"
            step="0.01"
            #target_amount="ngModel"
          />
          <div class="error" *ngIf="target_amount.invalid && target_amount.touched">
            El monto objetivo es requerido
          </div>
        </div>
        
        <div class="form-group">
          <label for="current_amount">Monto Actual</label>
          <input
            type="number"
            id="current_amount"
            name="current_amount"
            [(ngModel)]="goal.current_amount"
            min="0"
            step="0.01"
          />
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="start_date">Fecha de Inicio</label>
          <input
            type="date"
            id="start_date"
            name="start_date"
            [(ngModel)]="goal.start_date"
          />
        </div>
        
        <div class="form-group">
          <label for="end_date">Fecha de Fin *</label>
          <input
            type="date"
            id="end_date"
            name="end_date"
            [(ngModel)]="goal.end_date"
            required
            #end_date="ngModel"
          />
          <div class="error" *ngIf="end_date.invalid && end_date.touched">
            La fecha de fin es requerida
          </div>
        </div>
      </div>
      
      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>
      
      <div class="form-actions">
        <a routerLink="/goals" class="btn-secondary">Cancelar</a>
        <button type="submit" [disabled]="goalForm.invalid || loading">
          {{ loading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Crear') }}
        </button>
      </div>
    </form>
  </div>
</div>
