<div class="savings-container">
  <div class="header">
    <h2>Mis Ahorros</h2>
    <a routerLink="/savings/new" class="btn-primary">+ Nuevo Ahorro</a>
  </div>
  
  <div class="filters">
    <div class="filter-group">
      <label for="timeRange">Período:</label>
      <select id="timeRange" [(ngModel)]="timeRange" (change)="onRangeChange()">
        <option value="all">Todos</option>
        <option value="week">Última semana</option>
        <option value="month">Último mes</option>
        <option value="quarter">Último trimestre</option>
        <option value="year">Último año</option>
      </select>
    </div>
    
    <div class="filter-group" *ngIf="categories.length > 0">
      <label for="category">Categoría:</label>
      <select id="category" [(ngModel)]="selectedCategory" (change)="onCategoryChange()">
        <option value="all">Todas</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>
  </div>
  
  <div *ngIf="loading" class="loading">
    Cargando ahorros...
  </div>
  
  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>
  
  <div *ngIf="!loading && filteredSavings.length === 0" class="empty-state">
    <p>No tienes registros de ahorro.</p>
    <a routerLink="/savings/new" class="btn-primary">Registrar tu primer ahorro</a>
  </div>
  
  <div class="savings-table-container" *ngIf="!loading && filteredSavings.length > 0">
    <table class="savings-table">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Descripción</th>
          <th>Categoría</th>
          <th>Monto</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let saving of filteredSavings">
          <td>{{ formatDate(saving.date) }}</td>
          <td>{{ saving.description }}</td>
          <td><span class="category-badge">{{ saving.category }}</span></td>
          <td class="amount">{{ formatAmount(saving.amount) }}</td>
          <td class="actions">
            <a [routerLink]="['/savings', saving._id, 'edit']" class="btn-edit">Editar</a>
            <button (click)="deleteSaving(saving._id!)" class="btn-delete">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
