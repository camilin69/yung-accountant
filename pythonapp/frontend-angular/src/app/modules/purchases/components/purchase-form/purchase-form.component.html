<div class="form-container">
  <div class="form-card">
    <h2>{{ isEditing ? 'Editar Compra' : 'Nueva Compra' }}</h2>
    
    <form (ngSubmit)="onSubmit()" #purchaseForm="ngForm">
      <div class="form-group">
        <label for="date">Fecha *</label>
        <input
          type="date"
          id="date"
          name="date"
          [(ngModel)]="purchase.date"
          required
          #date="ngModel"
        />
        <div class="error" *ngIf="date.invalid && date.touched">
          La fecha es requerida
        </div>
      </div>
      
      <div class="form-group">
        <label for="description">Descripción *</label>
        <input
          type="text"
          id="description"
          name="description"
          [(ngModel)]="purchase.description"
          required
          #description="ngModel"
        />
        <div class="error" *ngIf="description.invalid && description.touched">
          La descripción es requerida
        </div>
      </div>
      
      <div class="form-group">
        <label for="category">Categoría *</label>
        <select
          id="category"
          name="category"
          [(ngModel)]="purchase.category"
          required
        >
          <option *ngFor="let cat of categories" [value]="cat">
            {{ getCategoryLabel(cat) }}
          </option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="amount">Monto *</label>
        <input
          type="number"
          id="amount"
          name="amount"
          [(ngModel)]="purchase.amount"
          required
          min="0.01"
          step="0.01"
          #amount="ngModel"
        />
        <div class="error" *ngIf="amount.invalid && amount.touched">
          El monto debe ser mayor a 0
        </div>
      </div>
      
      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>
      
      <div class="form-actions">
        <a routerLink="/purchases" class="btn-secondary">Cancelar</a>
        <button type="submit" [disabled]="purchaseForm.invalid || loading">
          {{ loading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Guardar') }}
        </button>
      </div>
    </form>
  </div>
</div>
