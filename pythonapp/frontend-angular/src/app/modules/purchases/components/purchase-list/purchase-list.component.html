<div class="purchases-container">
  <div class="header">
    <h2>Mis Compras</h2>
    <a routerLink="/purchases/new" class="btn-primary">+ Nueva Compra</a>
  </div>
  
  <div class="filters">
    <div class="filter-group">
      <label for="timeRange">Período:</label>
      <select id="timeRange" [(ngModel)]="timeRange" (change)="onRangeChange()">
        <option value="all">Todos</option>
        <option value="week">Última semana</option>
        <option value="month">Último mes</option>
        <option value="quarter">Último trimestre</option>
        <option value="year">Último año</option>
      </select>
    </div>
    
    <div class="filter-group" *ngIf="categories.length > 0">
      <label for="category">Categoría:</label>
      <select id="category" [(ngModel)]="selectedCategory" (change)="onCategoryChange()">
        <option value="all">Todas</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>
  </div>
  
  <div *ngIf="loading" class="loading">
    Cargando compras...
  </div>
  
  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>
  
  <div *ngIf="!loading && filteredPurchases.length === 0" class="empty-state">
    <p>No tienes registros de compras.</p>
    <a routerLink="/purchases/new" class="btn-primary">Registrar tu primera compra</a>
  </div>
  
  <div class="purchases-table-container" *ngIf="!loading && filteredPurchases.length > 0">
    <table class="purchases-table">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Descripción</th>
          <th>Categoría</th>
          <th>Monto</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let purchase of filteredPurchases">
          <td>{{ formatDate(purchase.date) }}</td>
          <td>{{ purchase.description }}</td>
          <td><span class="category-badge">{{ purchase.category }}</span></td>
          <td class="amount">{{ formatAmount(purchase.amount) }}</td>
          <td class="actions">
            <a [routerLink]="['/purchases', purchase._id, 'edit']" class="btn-edit">Editar</a>
            <button (click)="deletePurchase(purchase._id!)" class="btn-delete">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
