<div class="income-container">
  <div class="header">
    <h2>Mis Ingresos</h2>
    <a routerLink="/storage/incomes/new" class="btn-primary">+ Nuevo Ingreso</a>
  </div>
  
  <div *ngIf="loading" class="loading">
    Cargando ingresos...
  </div>
  
  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>
  
  <div *ngIf="!loading && incomes.length === 0" class="empty-state">
    <p>No tienes registros de ingresos.</p>
    <a routerLink="/storage/incomes/new" class="btn-primary">Registrar tu primer ingreso</a>
  </div>
  
  <div class="income-table-container" *ngIf="!loading && incomes.length > 0">
    <table class="income-table">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Fuente</th>
          <th>Período</th>
          <th>Monto</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let income of incomes">
          <td>{{ formatDate(income.date) }}</td>
          <td>{{ income.source }}</td>
          <td>{{ getPeriodLabel(income.period) }}</td>
          <td class="amount">{{ formatAmount(income.amount) }}</td>
          <td class="actions">
            <a [routerLink]="['/storage/incomes', income._id, 'edit']" class="btn-edit">Editar</a>
            <button (click)="deleteIncome(income._id!)" class="btn-delete">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
