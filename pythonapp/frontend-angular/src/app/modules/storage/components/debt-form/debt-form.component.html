<div class="form-container">
  <div class="form-card">
    <h2>{{ isEditing ? 'Editar Registro' : 'Nuevo Registro' }}</h2>
    
    <form (ngSubmit)="onSubmit()" #debtForm="ngForm">
      <div class="form-group">
        <label for="type">Tipo *</label>
        <select
          id="type"
          name="type"
          [(ngModel)]="debt.type"
          required
        >
          <option value="debt">Deuda</option>
          <option value="credit">Crédito</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="concept">Concepto *</label>
        <input
          type="text"
          id="concept"
          name="concept"
          [(ngModel)]="debt.concept"
          required
          #concept="ngModel"
        />
        <div class="error" *ngIf="concept.invalid && concept.touched">
          El concepto es requerido
        </div>
      </div>
      
      <div class="form-group">
        <label for="amount">Monto *</label>
        <input
          type="number"
          id="amount"
          name="amount"
          [(ngModel)]="debt.amount"
          required
          min="0.01"
          step="0.01"
          #amount="ngModel"
        />
        <div class="error" *ngIf="amount.invalid && amount.touched">
          El monto debe ser mayor a 0
        </div>
      </div>
      
      <div class="form-group">
        <label for="date">Fecha *</label>
        <input
          type="date"
          id="date"
          name="date"
          [(ngModel)]="debt.date"
          required
          #date="ngModel"
        />
        <div class="error" *ngIf="date.invalid && date.touched">
          La fecha es requerida
        </div>
      </div>
      
      <div class="form-group">
        <label for="due_date">Fecha de Vencimiento</label>
        <input
          type="date"
          id="due_date"
          name="due_date"
          [(ngModel)]="debt.due_date"
        />
      </div>
      
      <div class="form-group">
        <label for="status">Estado *</label>
        <select
          id="status"
          name="status"
          [(ngModel)]="debt.status"
          required
        >
          <option value="pending">Pendiente</option>
          <option value="paid">Pagado</option>
        </select>
      </div>
      
      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>
      
      <div class="form-actions">
        <a routerLink="/storage/debts" class="btn-secondary">Cancelar</a>
        <button type="submit" [disabled]="debtForm.invalid || loading">
          {{ loading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Guardar') }}
        </button>
      </div>
    </form>
  </div>
</div>
