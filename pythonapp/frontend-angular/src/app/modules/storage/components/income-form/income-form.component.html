<div class="form-container">
  <div class="form-card">
    <h2>{{ isEditing ? 'Editar Ingreso' : 'Nuevo Ingreso' }}</h2>
    
    <form (ngSubmit)="onSubmit()" #incomeForm="ngForm">
      <div class="form-group">
        <label for="date">Fecha *</label>
        <input
          type="date"
          id="date"
          name="date"
          [(ngModel)]="income.date"
          required
          #date="ngModel"
        />
        <div class="error" *ngIf="date.invalid && date.touched">
          La fecha es requerida
        </div>
      </div>
      
      <div class="form-group">
        <label for="source">Fuente *</label>
        <input
          type="text"
          id="source"
          name="source"
          [(ngModel)]="income.source"
          required
          #source="ngModel"
        />
        <div class="error" *ngIf="source.invalid && source.touched">
          La fuente es requerida
        </div>
      </div>
      
      <div class="form-group">
        <label for="period">Período *</label>
        <select
          id="period"
          name="period"
          [(ngModel)]="income.period"
          required
        >
          <option *ngFor="let p of periods" [value]="p.value">
            {{ p.label }}
          </option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="amount">Monto *</label>
        <input
          type="number"
          id="amount"
          name="amount"
          [(ngModel)]="income.amount"
          required
          min="0.01"
          step="0.01"
          #amount="ngModel"
        />
        <div class="error" *ngIf="amount.invalid && amount.touched">
          El monto debe ser mayor a 0
        </div>
      </div>
      
      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>
      
      <div class="form-actions">
        <a routerLink="/storage/incomes" class="btn-secondary">Cancelar</a>
        <button type="submit" [disabled]="incomeForm.invalid || loading">
          {{ loading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Guardar') }}
        </button>
      </div>
    </form>
  </div>
</div>
